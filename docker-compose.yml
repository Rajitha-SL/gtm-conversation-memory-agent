version: '3.8'

services:
  database:
    image: ankane/pgvector:latest
    container_name: gtm_memory_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gtm_admin
      POSTGRES_PASSWORD: admin_secure_pass123
      POSTGRES_DB: gtm_memory_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  queue_broker:
    image: redis:7-alpine
    container_name: gtm_memory_queue
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: